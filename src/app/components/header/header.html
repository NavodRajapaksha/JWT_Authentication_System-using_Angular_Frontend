

<!-- header.html -->
<header class="app-header d-flex align-items-center justify-content-between px-4">

  <!-- Brand -->
  <div class="d-flex align-items-center gap-2">
    <mat-icon class="menu-icon" (click)="toggleMenu()" *ngIf="!isHomePage">menu</mat-icon>
    <span class="brand-name">AuthSys</span>
  </div>

  <!-- Center Nav -->
  <ul class="nav-links d-flex align-items-center gap-1 list-unstyled mb-0">
    <li>
      <a class="nav-link-item" routerLink="/home" routerLinkActive="nav-active">Home</a>
    </li>
    <li>
      <a class="nav-link-item" routerLink="/pricing" routerLinkActive="nav-active">Pricing</a>
    </li>
    <li>
      <a class="nav-link-item" routerLink="/admin"
        routerLinkActive="nav-active"
        *ngIf="user.roleEqual(['Admin'])">Enterprise</a>
      <a class="nav-link-item" routerLink="/admin"
        routerLinkActive="nav-active"
        *ngIf="!user.roleEqual(['Admin'])">Enterprise</a>
    </li>
    <li>
      <a class="nav-link-item" routerLink="/docs" routerLinkActive="nav-active">Docs</a>
    </li>
  </ul>

  <!-- Right Actions -->
  <div class="d-flex align-items-center gap-2">
    <button
      *ngIf="!isLoggedIn()"
      class="btn btn-login"
      routerLink="/login">
      Login
    </button>

    <button
      *ngIf="!isLoggedIn()"
      class="btn btn-signup"
      routerLink="/signup">
      Sign Up
    </button>

    <button
      *ngIf="isLoggedIn()"
      class="btn btn-logout"
      (click)="logout()">
      Logout
    </button>
  </div>

</header>
