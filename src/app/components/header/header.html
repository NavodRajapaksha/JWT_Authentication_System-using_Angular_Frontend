<header class="d-flex align-items-center justify-content-between py-3 px-3">

  <div class="d-flex align-items-center gap-2">
    <mat-icon style="cursor: pointer; color: aliceblue;" (click)="toggleMenu()">menu</mat-icon>
    <span class="fw-bold">My App</span>
  </div>

  <ul class="nav justify-content-center">
    <li><a href="#" class="nav-link px-2 link-secondary">Home</a></li>
    <li><a href="#" class="nav-link px-2">Admin Dashboard</a></li>
    <li><a href="#" class="nav-link px-2">User Dashboard</a></li>
  </ul>

  <div>
    <button *ngIf="!isLoggedIn" type="button" class="btn btn-outline-primary me-2" routerLink="/login">Login</button>
    <button *ngIf="isLoggedIn" type="button" class="btn btn-primary" (click)="logout()">Logout</button>
  </div>

</header>
