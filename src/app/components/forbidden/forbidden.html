<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 Forbidden — Preview</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  
</style>
</head>
<body>

  <!-- Background 403 -->
  <div class="bg-text">403</div>

  <!-- Main Content -->
  <div class="forbidden-card">

    <!-- Badge -->
    <div class="restricted-badge">
      🔒 &nbsp;RESTRICTED AREA
    </div>

    <!-- Title -->
    <h1 class="forbidden-title">Access Denied</h1>

    <!-- Description -->
    <p class="forbidden-desc">
      You don't have the required permissions to view
      this publication. Please contact your workspace
      administrator or verify your credentials.
    </p>

    <!-- Buttons -->
    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-home" routerLink="/home">
        <span class="arrow">←</span>
        <span>Back to<br>Home</span>
      </button>
      <button class="btn btn-contact">
        Contact<br>Support
      </button>
    </div>

    <!-- Divider -->
    <div class="protocol-divider">
      <span class="line"></span>
      <span class="protocol-text">Security Protocol 403-A</span>
      <span class="line"></span>
    </div>

  </div>

  <!-- Footer -->
  <footer class="forbidden-footer">
    <span>© 2024 EDITORIALSAAS INFRASTRUCTURE</span>
    <div class="footer-links">
      <a href="#">SYSTEM STATUS</a>
      <a href="#">PRIVACY POLICY</a>
    </div>
  </footer>

</body>
</html>
