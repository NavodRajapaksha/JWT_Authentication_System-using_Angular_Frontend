<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="background-color: #f4f7f6;">
  <div class="card shadow-sm border-0" style="max-width: 450px; width: 100%; border-radius: 8px;">
    <div class="card-body p-4 p-md-5 text-center">
      
      <h3 class="fw-bold mb-2" style="color: #1a1a1a;">Open up your Spring Boot Academy Account Now</h3>
      <p class="text-muted mb-4" style="font-size: 0.95rem;">
        Already signed up? <a href="#" class="text-decoration-none fw-semibold" style="color: #0d47a1;">Log in</a>
      </p>

      <form #signupForm="ngForm" (ngSubmit)="register()">
        <div class="mb-3">
          <input type="email" #email="ngModel" name="email" [(ngModel)]="signupData.username" class="form-control form-control-lg" placeholder="Your Email Address" style="font-size: 0.95rem;" email required>
          <div *ngIf="email.invalid && email.touched" class="text-danger">
            <div *ngIf="email.errors?.['required']">Email is required.</div>
            <div *ngIf="email.errors?.['email']">Please enter a valid email address.</div>
          </div>
        </div>

        <div class="mb-3">
          <input type="password" #password="ngModel" name="password" [(ngModel)]="signupData.userPassword" class="form-control form-control-lg" placeholder="Create A Password" style="font-size: 0.95rem;" required="">
          <div *ngIf="password.invalid && password.touched" class="text-danger">
            <div *ngIf="password.errors?.['required']">Password is required.</div>
            <div *ngIf="password.errors?.['minlength']">Password must be at least 6 characters long.</div>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-6 pe-2">
            <input type="text" #firstName="ngModel" name="firstName" [(ngModel)]="signupData.userFirstName" class="form-control form-control-lg" placeholder="First Name" style="font-size: 0.95rem;" required="">
            <div *ngIf="firstName.invalid && firstName.touched" class="text-danger">
              <div *ngIf="firstName.errors?.['required']">First name is required.</div>
            </div>
          </div>
          
          <div class="col-6 ps-2">
            <input type="text" #lastName="ngModel" name="lastName" [(ngModel)]="signupData.userLastName" class="form-control form-control-lg" placeholder="Last Name" style="font-size: 0.95rem;" required="">
            <div *ngIf="lastName.invalid && lastName.touched" class="text-danger">
              <div *ngIf="lastName.errors?.['required']">Last name is required.</div>
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="signupForm.invalid" [ngClass]="{'btn-disable' : signupForm.invalid}" class="btn w-100 text-white fw-semibold mb-4" style="background-color: #113279; padding: 12px;">
          Sign Up
        </button>
      </form>

    </div>
  </div>
</div>
