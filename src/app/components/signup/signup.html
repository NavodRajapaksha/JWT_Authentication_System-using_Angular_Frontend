
<div class="signup-page">

  <!-- Header Text -->
  <div class="signup-heading text-center">
    <h1 class="signup-title">Join our followship</h1>
    <div class="signup-sub-row d-flex align-items-center justify-content-center gap-3">
      <p class="signup-sub">Step into the digital workshop.</p>
      <a class="signin-link" routerLink="/login">Log in →</a>
    </div>
  </div>

  <!-- Card -->
  <div class="signup-card">

    <form #signupForm="ngForm" (ngSubmit)="register()">

      <!-- Name Row -->
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="field-label">First Name</label>
          <input
            type="text"
            #firstName="ngModel"
            name="firstName"
            [(ngModel)]="signupData.userFirstName"
            class="field-input"
            placeholder="e.g. Julian"
            required>
          <div *ngIf="firstName.invalid && firstName.touched" class="field-error">Required</div>
        </div>
        <div class="col-6">
          <label class="field-label">Last Name</label>
          <input
            type="text"
            #lastName="ngModel"
            name="lastName"
            [(ngModel)]="signupData.userLastName"
            class="field-input"
            placeholder="e.g. Barnes"
            required>
          <div *ngIf="lastName.invalid && lastName.touched" class="field-error">Required</div>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="field-label">Email</label>
        <input
          type="email"
          #email="ngModel"
          name="email"
          [(ngModel)]="signupData.username"
          class="field-input"
          placeholder="writer@editorialsaas.com"
          email required>
        <div *ngIf="email.invalid && email.touched" class="field-error">
          <span *ngIf="email.errors?.['required']">Required</span>
          <span *ngIf="email.errors?.['email']">Valid email required</span>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="field-label">Password</label>
        <input
          type="password"
          #password="ngModel"
          name="password"
          [(ngModel)]="signupData.userPassword"
          class="field-input"
          placeholder="••••••••"
          required>
        <div *ngIf="password.invalid && password.touched" class="field-error">Required</div>
      </div>

      <!-- Terms -->
      <div class="terms-row mb-4">
        <input type="checkbox" id="terms" class="terms-check" required>
        <label for="terms" class="terms-label">
          I agree to the <a href="#" class="terms-link">Terms of Service</a>
        </label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="signupForm.invalid"
        class="btn-create w-100">
        Create account →
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">OR CONTINUE WITH</span>
      <span class="divider-line"></span>
    </div>

    <!-- Social Buttons -->
    <div class="row g-2">
      <div class="col-6">
        <button class="btn-social w-100">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" height="18" alt="Google">
          Google
        </button>
      </div>
      <div class="col-6">
        <button class="btn-social w-100">
          <img src="https://www.svgrepo.com/show/512317/github-142.svg" width="18" height="18" alt="GitHub">
          GitHub
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom note -->
  <p class="bottom-note text-center">By signing up, you join 12,000+ editors worldwide.</p>

</div>
