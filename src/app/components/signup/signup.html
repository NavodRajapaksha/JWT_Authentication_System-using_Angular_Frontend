<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="background-color: #f4f7f6;">
  <div class="card shadow-sm border-0" style="max-width: 450px; width: 100%; border-radius: 8px;">
    <div class="card-body p-4 p-md-5 text-center">
      
      <h3 class="fw-bold mb-2" style="color: #1a1a1a;">Open up your Spring Boot Academy Account Now</h3>
      <p class="text-muted mb-4" style="font-size: 0.95rem;">
        Already signed up? <a href="#" class="text-decoration-none fw-semibold" style="color: #0d47a1;">Log in</a>
      </p>

      <form>
        <div class="mb-3">
          <input type="email" class="form-control form-control-lg" placeholder="Your Email Address" style="font-size: 0.95rem;">
        </div>
        <div class="mb-3">
          <input type="password" class="form-control form-control-lg" placeholder="Create A Password" style="font-size: 0.95rem;">
        </div>
        <div class="row mb-4">
          <div class="col-6 pe-2">
            <input type="text" class="form-control form-control-lg" placeholder="First Name" style="font-size: 0.95rem;">
          </div>
          <div class="col-6 ps-2">
            <input type="text" class="form-control form-control-lg" placeholder="Last Name" style="font-size: 0.95rem;">
          </div>
        </div>

        <button type="submit" class="btn w-100 text-white fw-semibold mb-4" style="background-color: #113279; padding: 12px;">
          Sign Up
        </button>
      </form>

      <div class="d-flex align-items-center mb-4">
        <hr class="flex-grow-1 text-muted">
        <span class="mx-3 text-muted" style="font-size: 0.85rem;">OR</span>
        <hr class="flex-grow-1 text-muted">
      </div>

      <button type="button" class="btn btn-outline-primary w-100 mb-3 d-flex align-items-center justify-content-center" style="color: #3b5998; border-color: #3b5998; padding: 10px;">
        <i class="bi bi-facebook me-2 fs-5"></i> Connect With facebook
      </button>
      
      <button type="button" class="btn btn-outline-info w-100 d-flex align-items-center justify-content-center" style="color: #55acee; border-color: #55acee; padding: 10px;">
        <i class="bi bi-twitter me-2 fs-5"></i> Connect With twitter
      </button>

    </div>
  </div>
</div>
