<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome back</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

  </style>
</head>

<body>


  <div class="login-card">

    <h2 class="login-title text-center">Welcome back</h2>
    <p class="signup-text text-center">
      Don't have an account?
      <a href="#">Sign up for free</a>
    </p>

    <form id="loginForm" novalidate #loginForm="ngForm" (ngSubmit)="login(loginForm)">

      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label">Username or Email</label>

        <input
          type="text"
          id="username"
          ngModel
          name="username"
          class="form-control"
          placeholder="Enter your username"
          required
        />
        <div class="invalid-feedback">Username is required.</div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label for="userPassword" class="form-label mb-0">Password</label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <div class="password-wrapper">

          <input
            [type]="showPassword ? 'text' : 'password'"
            id="userPassword"
            ngModel
            name="userPassword"
            class="form-control"
            placeholder="••••••••"
            required
          />

          <button
            type="button"
            class="toggle-password"
            (click)="togglePwd()"
            tabindex="-1"
          >
            <i class="bi"
            [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" ></i>
          </button>
        </div>
        <div class="invalid-feedback">Password is required.</div>
      </div>

      <!-- Sign In Button -->
      <button type="submit" class="btn-signin mb-2">
        Sign in &nbsp;→
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR CONTINUE WITH</span>
    </div>

    <div class="d-flex gap-2">
      <button type="button" class="btn-social">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
        Google
      </button>
      <button type="button" class="btn-social">
        <i class="bi bi-building" style="font-size:1rem; color:#555;"></i>
        SSO
      </button>
    </div>

    <p class="security-note">Protected by EditorialSaaS Security Cluster</p>

  </div>
</body>
</html>
